# Release workflow — builds pre-compiled binaries for Linux x86-64, macOS ARM64,
# and Windows x86-64 whenever a version tag (v*) is pushed.
#
# Artifacts are attached to the GitHub Release so users need zero Rust toolchain setup.

name: Release Binaries

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: axiom_engine

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            archive_ext: tar.gz

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            archive_ext: tar.gz

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axiom_engine_rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('axiom_engine_rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev build-essential

      - name: Build release binary
        working-directory: axiom_engine_rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          STAGING="axiom-ttt-${{ github.ref_name }}-${{ matrix.artifact_suffix }}"
          mkdir -p "$STAGING"
          cp axiom_engine_rs/target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "axiom-ttt-${{ github.ref_name }}-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "axiom_engine_rs\target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe" $staging\
          if (Test-Path "README.md")  { Copy-Item README.md  $staging\ }
          if (Test-Path "LICENSE")    { Copy-Item LICENSE    $staging\ }
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"
          echo "ASSET=${staging}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
